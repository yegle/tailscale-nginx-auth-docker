name: Sync Main into Latest Version Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find, merge, and trigger build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all remote branches
          git fetch --all

          # Find the latest version branch (highest semver vX.Y.Z) (append || true to prevent set -e crash if empty)
          LATEST_BRANCH=$(git branch -r | grep 'origin/v' | sed 's|  origin/||' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)

          if [ -z "$LATEST_BRANCH" ]; then
            echo "No version branches found to merge into."
            exit 0
          fi

          echo "Latest version branch found: $LATEST_BRANCH"

          # Checkout the latest version branch
          git checkout -B "$LATEST_BRANCH" origin/"$LATEST_BRANCH"

          # Merge origin/main into the branch with --ff flag
          echo "Merging origin/main into $LATEST_BRANCH..."
          git merge origin/main --ff

          # Push the updated branch back to origin
          git push origin refs/heads/"$LATEST_BRANCH"

          # Trigger the release workflow build for this updated branch
          echo "Triggering release workflow for branch: $LATEST_BRANCH"
          gh workflow run release.yml --ref "$LATEST_BRANCH"
