name: Build and Release Image

on:
  push:
    branches:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare lowercase image name
        id: prep
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Determine if latest version branch
        id: check_latest
        run: |
          git fetch --all
          LATEST_BRANCH=$(git branch -r | grep 'origin/v' | sed 's|  origin/||' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          echo "Latest branch is: $LATEST_BRANCH"
          if [ "$LATEST_BRANCH" = "${{ github.ref_name }}" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ steps.check_latest.outputs.is_latest == 'true' || github.ref_name == 'main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            TAILSCALE_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
