name: Sync Tailscale Tags

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync new tags to branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all remote branches
          git fetch --all

          # Get Tailscale tags matching vX.Y.Z
          REMOTE_TAGS=$(git ls-remote --tags https://github.com/tailscale/tailscale.git 'refs/tags/v*' | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')

          # Get existing remote branch names matching v* (append || true to prevent set -e crash if empty)
          EXISTING_BRANCHES=$(git branch -r | grep 'origin/v' | sed 's|  origin/||' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)

          # Find versions present in remote Tailscale tags but missing as branches in our repo
          MIN_VERSION="v1.100.0"
          NEW_BRANCHES=()
          for tag in $REMOTE_TAGS; do
            # Compare version strings using sort -V (match tags >= MIN_VERSION)
            if [ "$(printf '%s\n%s' "$MIN_VERSION" "$tag" | sort -V | head -n1)" = "$MIN_VERSION" ]; then
              if ! echo "$EXISTING_BRANCHES" | grep -qx "$tag"; then
                NEW_BRANCHES+=("$tag")
              fi
            fi
          done

          if [ ${#NEW_BRANCHES[@]} -eq 0 ]; then
            echo "No new version branches to sync."
            exit 0
          fi

          # Sort the new branches in ascending version order
          IFS=$'\n' SORTED_BRANCHES=($(sort -V <<<"${NEW_BRANCHES[*]}"))
          unset IFS

          echo "Found new version branches to create: ${SORTED_BRANCHES[*]}"

          # Limit to syncing at most 3 version branches per run to avoid workflow overload
          LIMIT=3
          COUNT=0

          for tag in "${SORTED_BRANCHES[@]}"; do
            if [ "$COUNT" -ge "$LIMIT" ]; then
              echo "Reached limit of $LIMIT branches synced in this run."
              break
            fi
            echo "Creating and pushing branch: $tag"
            
            # Ensure we are on a clean main state
            git checkout main
            git checkout -b "$tag" origin/main
            git push origin "$tag"
            
            # Explicitly trigger the release workflow on this branch using GitHub CLI
            echo "Triggering release workflow for branch: $tag"
            gh workflow run release.yml --ref "$tag"
            
            COUNT=$((COUNT + 1))
          done
